<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Diri</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#c7ebff,#9fd8ff);
}

.container{
    width:100%;
    max-width:650px;
}

.card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.4);
    border-radius:25px;
    padding:30px;
    box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:black;
    margin-bottom:25px;
}

.form-row{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:16px;
}

button{
    background:#003b8e;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 22px;
    cursor:pointer;
    font-size:16px;
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(0.9);
}

.error{
    margin-top:15px;
    color:red;
    text-align:center;
}

.hidden{
    display:none;
}

.fadeIn{
    animation:fadeIn .8s ease;
}

.slidePage{
    animation:slidePage .8s ease;
}

.profile{
    text-align:center;
    margin-bottom:20px;
}

.profile img{
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid white;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.data-box{
    background:rgba(255,255,255,0.45);
    border-radius:15px;
    padding:20px;
    overflow-wrap:break-word;
}

.data-item{
    margin-bottom:20px;
}

.label{
    font-weight:bold;
    margin-bottom:8px;
}

.back-btn{
    width:100%;
    margin-top:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

@keyframes slidePage{
    from{
        opacity:0;
        transform:translateX(60px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@media(max-width:500px){

    .form-row{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .profile img{
        width:110px;
        height:110px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- HALAMAN FORM -->
    <div class="card fadeIn" id="formPage">

        <h1>Data Diri</h1>

        <div class="form-row">
            <input type="text"
            id="nama"
            placeholder="Nama Lengkap">

            <button onclick="cekData()">
                Submit
            </button>
        </div>

        <div id="error" class="error"></div>

    </div>

    <!-- HALAMAN DATA -->
    <div class="card slidePage hidden" id="dataPage">

        <div class="profile">
            <img id="foto"
            src=""
            alt="Foto Profil">
        </div>

        <h1>Data Diri</h1>

        <div class="data-box">

            <div class="data-item">
                <div class="label">Nama</div>
                <div id="hasilNama"></div>
            </div>

            <div class="data-item">
                <div class="label">Tempat / Tanggal Lahir</div>
                <div id="hasilTTL"></div>
            </div>

            <div class="data-item">
                <div class="label">Status</div>
                <div id="hasilStatus"></div>
            </div>

        </div>

        <button class="back-btn" onclick="kembali()">
            Kembali
        </button>

    </div>

</div>

<script>

const dataKeluarga = {

"Uwais Arrafif Sirrulhaq":{
ttl:"Mataram, 22 Juli 2014",
status:"Siswa SD",
foto:"Uwais Arrafif Sirrulhaq.jpg"
},

"Fitria Andriani":{
ttl:"Mataram, 30 April 1985",
status:"PNS",
foto:"Fitria Andriani.jpg"
},

"Aisyah Khumaira":{
ttl:"Mataram, 14 Juni 2006",
status:"Mahasiswa",
foto:"Aisyah Khumaira.jpg"
},

"Rahmawati":{
ttl:"Makassar, 24 Agustus 1952",
status:"Pensiun",
foto:"Rahmawati.jpg"
}

};

function cekData(){

let nama =
document.getElementById("nama")
.value.trim();

if(dataKeluarga[nama]){

document.getElementById("hasilNama")
.innerText = nama;

document.getElementById("hasilTTL")
.innerText = dataKeluarga[nama].ttl;

document.getElementById("hasilStatus")
.innerText = dataKeluarga[nama].status;

document.getElementById("foto")
.src = dataKeluarga[nama].foto;

document.getElementById("formPage")
.classList.add("hidden");

setTimeout(()=>{

document.getElementById("dataPage")
.classList.remove("hidden");

},300);

}else{

document.getElementById("error")
.innerText =
"Nama tidak terdaftar.";

}

}

function kembali(){

document.getElementById("nama").value="";
document.getElementById("error").innerText="";

document.getElementById("dataPage")
.classList.add("hidden");

setTimeout(()=>{

document.getElementById("formPage")
.classList.remove("hidden");

},300);

}

</script>

</body>
  </html>
